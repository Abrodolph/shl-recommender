# Render blueprint (https://render.com/docs/blueprint-spec).
# Deploys the Docker image; Render injects $PORT and pings /health.
services:
  - type: web
    name: shl-recommender
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # 512MB is tight with torch; bump to standard if OOM
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false          # set in the Render dashboard; never commit the key
